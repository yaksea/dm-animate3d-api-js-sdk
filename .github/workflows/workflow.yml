# 推送以 v 开头的 tag（例如 v1.0.0）时构建并发布到 npm。
# 在仓库 Settings → Secrets and variables → Actions 中配置 NPM_TOKEN（npm 访问令牌，需具备 publish 权限）。
# 若使用 GitHub Environment「release」保护规则，请将 NPM_TOKEN 配置在该 Environment 下。

name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify package.json version matches git tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag $GITHUB_REF_NAME (expected $TAG)"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --passWithNoTests

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
